<!DOCTYPE html>
<html>
<head>
  <title>AgencyOS - Seed Demo Project</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { background: #000; color: #fff; font-family: system-ui, sans-serif; padding: 40px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 30px; }
    button { background: #06b6d4; color: #000; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; }
    button:hover { background: #22d3ee; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #log { margin-top: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); font-family: monospace; font-size: 12px; white-space: pre-wrap; min-height: 200px; }
    .success { color: #34d399; }
    .error { color: #f87171; }
    .warn { color: #fbbf24; }
  </style>
</head>
<body>
  <h1>Seed Demo Project</h1>
  <p>Creates a sample "Urban Spice" restaurant project in your AgencyOS account.<br>You must be logged in to the main app first (open /login in another tab).</p>
  <button id="seedBtn" onclick="seedProject()">Create Demo Project</button>
  <div id="log"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://qzpdwywgkoloksiiayrf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_3B6sqRtONpFqiuzNZuuzug_3lmxiXS0';

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    function log(msg, type) {
      const el = document.getElementById('log');
      const cls = type === 'success' ? 'success' : type === 'error' ? 'error' : type === 'warn' ? 'warn' : '';
      el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
      el.scrollTop = el.scrollHeight;
    }

    window.seedProject = async function() {
      const btn = document.getElementById('seedBtn');
      btn.disabled = true;
      document.getElementById('log').innerHTML = '';

      try {
        log('Checking authentication...');
        const { data: { session }, error: sessErr } = await supabase.auth.getSession();
        
        if (sessErr) {
          log(`Auth error: ${sessErr.message}`, 'error');
          throw sessErr;
        }

        if (!session) {
          log('', 'error');
          log('NOT LOGGED IN!', 'error');
          log('', 'error');
          log('Please do the following:', 'warn');
          log('1. Open /login in another tab', 'warn');
          log('2. Login with your credentials', 'warn');
          log('3. Come back here and click the button again', 'warn');
          btn.disabled = false;
          return;
        }

        const user = session.user;
        log(`Logged in as: ${user.email}`, 'success');

        // Create project
        log('Creating project "Urban Spice"...');
        const { data: project, error: projErr } = await supabase.from('projects').insert({
          owner: user.id,
          name: 'Urban Spice',
          industry: 'Restaurant',
          template: 'restaurant',
          slug: 'urban-spice-demo-' + Date.now(),
          description: 'Premium fine dining restaurant in the heart of Mumbai. Modern Indian cuisine with a contemporary twist.',
          primary_color: '#06b6d4',
          secondary_color: '#8b5cf6',
          published: false,
        }).select().single();

        if (projErr) {
          log(`Project error: ${projErr.message}`, 'error');
          throw projErr;
        }
        log(`Project created: ${project.name}`, 'success');

        // Create home page
        log('Creating pages...');
        const { data: homePage, error: pageErr } = await supabase.from('pages').insert({
          project_id: project.id,
          title: 'Home',
          slug: '/',
          is_home: true,
          sort_order: 0,
        }).select().single();

        if (pageErr) {
          log(`Page error: ${pageErr.message}`, 'error');
          throw pageErr;
        }

        await supabase.from('pages').insert([
          { project_id: project.id, title: 'About', slug: '/about', sort_order: 1 },
          { project_id: project.id, title: 'Menu', slug: '/menu', sort_order: 2 },
          { project_id: project.id, title: 'Contact', slug: '/contact', sort_order: 3 },
        ]);
        log('Pages created: Home, About, Menu, Contact', 'success');

        // Create theme
        log('Creating theme...');
        await supabase.from('themes').insert({
          project_id: project.id,
          primary_color: '#06b6d4',
          secondary_color: '#8b5cf6',
          font: 'Inter',
          radius: 'xl',
          mode: 'dark',
        });
        log('Theme created', 'success');

        // Create sections
        log('Creating 10 premium sections...');
        const sections = [
          {
            page_id: homePage.id, type: 'navbar', sort_order: 1,
            config: { brandName: 'Urban Spice', links: ['Home', 'About', 'Menu', 'Gallery', 'Reservations', 'Contact'], ctaText: 'Reserve a Table' }
          },
          {
            page_id: homePage.id, type: 'hero', sort_order: 2,
            config: {
              eyebrow: 'Fine Dining Experience',
              title: 'Urban Spice — Where Flavors Tell Stories',
              subtitle: 'Experience modern Indian cuisine crafted by award-winning chefs. Every dish is a journey through spices, textures, and traditions reimagined for the contemporary palate.',
              buttonText: 'Reserve Your Table',
              heroImage: 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800&q=80',
              trustLogos: ['Zomato 4.8★', 'Dineout Partner', 'Times Food Award', '2000+ Reviews'],
            }
          },
          {
            page_id: homePage.id, type: 'features', sort_order: 3,
            config: {
              eyebrow: 'Why Urban Spice',
              title: 'A Dining Experience Like No Other',
              subtitle: 'From farm-fresh ingredients to tableside service, every detail is curated for perfection.',
              items: ['Award-Winning Chef', 'Farm-to-Table Fresh', 'Private Dining Rooms', 'Craft Cocktail Bar', 'Live Music Weekends', 'Valet Parking'],
            }
          },
          {
            page_id: homePage.id, type: 'gallery', sort_order: 4,
            config: {
              eyebrow: 'Our World',
              title: 'A Glimpse Inside Urban Spice',
              images: [
                'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600&q=80',
                'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600&q=80',
                'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=600&q=80',
                'https://images.unsplash.com/photo-1466978913421-dad2ebd01d17?w=600&q=80',
                'https://images.unsplash.com/photo-1559339352-11d035aa65de?w=600&q=80',
                'https://images.unsplash.com/photo-1424847651672-bf20a4b0982b?w=600&q=80',
              ],
            }
          },
          {
            page_id: homePage.id, type: 'pricing', sort_order: 5,
            config: {
              eyebrow: 'Dining Options',
              title: 'Choose Your Experience',
              subtitle: 'From intimate dinners to grand celebrations.',
              plans: [
                { name: 'Lunch Prix Fixe', price: '\u20B91,499', features: ['3-course meal', 'Welcome drink', "Chef's amuse-bouche", 'Weekday special'] },
                { name: 'Dinner Tasting', price: '\u20B93,999', features: ['7-course tasting menu', 'Wine pairing option', 'Live kitchen view', 'Digestif included'] },
                { name: 'Private Event', price: 'Custom', features: ['Exclusive dining room', 'Custom menu design', 'Personal sommelier', 'Valet for 20 cars'] },
              ],
            }
          },
          {
            page_id: homePage.id, type: 'testimonials', sort_order: 6,
            config: {
              eyebrow: 'Guest Reviews',
              title: 'What Our Guests Say',
              subtitle: 'Join thousands of happy diners.',
              items: [
                { name: 'Priya Mehta', text: 'The tasting menu was an absolute revelation. Each course was a surprise. This is fine dining at its finest in Mumbai.', role: 'Food Blogger' },
                { name: 'Rajesh Kumar', text: 'Hosted our anniversary here and the team made it magical. The private dining room and custom menu were perfect.', role: 'Regular Guest' },
                { name: 'Ananya Shah', text: 'As a chef myself, I rarely get impressed. Urban Spice made me feel like a first-time diner again.', role: 'Chef & Restaurateur' },
              ],
            }
          },
          {
            page_id: homePage.id, type: 'faq', sort_order: 7,
            config: {
              eyebrow: 'FAQ',
              title: 'Frequently Asked Questions',
              items: [
                { question: 'Do I need a reservation?', answer: 'We strongly recommend reservations for dinner, especially weekends. Walk-ins welcome for lunch.' },
                { question: 'Is there a dress code?', answer: 'Smart casual attire is appreciated.' },
                { question: 'Do you accommodate dietary restrictions?', answer: 'Yes — vegetarian, vegan, gluten-free, and more. Inform us when booking.' },
                { question: 'Is valet parking available?', answer: 'Yes, complimentary valet for all dinner guests.' },
              ],
            }
          },
          {
            page_id: homePage.id, type: 'contact', sort_order: 8,
            config: {
              eyebrow: 'Visit Us',
              title: 'Make a Reservation',
              subtitle: "We'd love to welcome you.",
              phone: '+91 22 4567 8900',
              email: 'reservations@urbanspice.in',
              whatsapp: '+919876543210',
              address: '42 Marine Drive, Colaba, Mumbai 400001',
              openingHours: 'Lunch: 12-3 PM | Dinner: 7-11 PM',
              instagram: 'urbanspice.mumbai',
              facebook: 'urbanspicemumbai',
            }
          },
          {
            page_id: homePage.id, type: 'cta', sort_order: 9,
            config: {
              eyebrow: 'Limited Seats',
              title: 'Your Table Awaits',
              subtitle: 'Weekend tables fill up fast. Reserve now.',
              buttonText: 'Reserve Now',
              secondaryButtonText: 'View Menu',
            }
          },
          {
            page_id: homePage.id, type: 'footer', sort_order: 10,
            config: {
              brandName: 'Urban Spice',
              tagline: 'Modern Indian fine dining in the heart of Mumbai.',
              phone: '+91 22 4567 8900',
              email: 'reservations@urbanspice.in',
              address: '42 Marine Drive, Colaba, Mumbai 400001',
              links: ['Home', 'About', 'Menu', 'Gallery', 'Reservations', 'Contact'],
              services: ['Fine Dining', 'Private Events', 'Cocktail Bar', 'Catering', "Chef's Table", 'Wine Tasting'],
              instagram: 'urbanspice.mumbai',
              facebook: 'urbanspicemumbai',
              linkedin: 'urbanspice',
            }
          },
        ];

        const { error: secErr } = await supabase.from('sections').insert(sections);
        if (secErr) {
          log(`Sections error: ${secErr.message}`, 'error');
          throw secErr;
        }
        log('10 sections created with premium content', 'success');

        log('');
        log('==========================================', 'success');
        log('  DEMO PROJECT CREATED SUCCESSFULLY!', 'success');
        log('==========================================', 'success');
        log('');
        log('Now go to: /projects');
        log('You will see "Urban Spice" — click Edit to open Builder');
        log(`Project ID: ${project.id}`, 'warn');

      } catch (err) {
        log(`\nFailed: ${err.message}`, 'error');
        log('\nTroubleshooting:', 'warn');
        log('- Make sure you are logged in at /login', 'warn');
        log('- Check browser console (F12) for details', 'warn');
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
